<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouquet Builder 💐</title>

<style>

body{
margin:0;
font-family:system-ui, Arial;
background:#fff8f8;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
text-align:center;
padding:16px;
box-sizing:border-box;
}

.card{
background:white;
padding:28px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
width:min(640px,92vw);
position:relative;
overflow:hidden;
}

h1{
font-weight:800;
margin-bottom:6px;
font-size:clamp(26px,4vw,34px);
}

.subtitle{
font-size:16px;
opacity:.75;
margin-bottom:18px;
}

button{
padding:12px 22px;
font-size:17px;
border-radius:12px;
border:none;
background:#111;
color:white;
cursor:pointer;
transition:opacity .2s, transform .15s, box-shadow .2s;
font-weight:600;
}

button:hover{opacity:.92;}
button:active{transform:scale(.96);}
button:disabled{opacity:.68;cursor:default;}

button.shake{animation:shake .4s;}
button.charge{box-shadow:0 0 18px rgba(255,120,160,.7);}
button.pulse{animation:pulse 1.2s ease infinite;}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-4px)}
50%{transform:translateX(4px)}
75%{transform:translateX(-4px)}
100%{transform:translateX(0)}
}

#garden{
margin-top:20px;
font-size:40px;
line-height:1.6;
min-height:60px;
}

.flower{
display:inline-block;
animation:bloom .35s ease-out;
margin:4px;
}

@keyframes bloom{
0%{transform:scale(.2);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

.swirl{
animation:swirl .6s ease-in forwards;
}

@keyframes swirl{
0%{transform:scale(1);opacity:1;}
100%{transform:scale(.2) translateY(-70px) rotate(360deg);opacity:0;}
}

#bouquetImage{
margin-top:16px;
display:none;
max-width:min(300px,80vw);
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
opacity:0;
transform:scale(.95);
transition:opacity .7s ease, transform .6s ease;
margin-left:auto;
margin-right:auto;
}

#bouquetImage.show{
opacity:1;
transform:scale(1);
animation:bouquetPop .6s ease;
}

@keyframes bouquetPop{
0%{transform:scale(.85);}
60%{transform:scale(1.04);}
100%{transform:scale(1);}
}

#finalMessage{
margin-top:12px;
font-size:clamp(18px,3.8vw,22px);
font-weight:700;
display:none;
line-height:1.45;
opacity:0;
transform:translateY(6px);
transition:opacity .5s ease, transform .5s ease;
}

#finalMessage.show{
opacity:1;
transform:translateY(0);
}

.petal{
position:fixed;
top:-40px;
font-size:20px;
pointer-events:none;
animation:petalFall 4s linear forwards;
z-index:9999;
}

@keyframes petalFall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

.explosion{
position:fixed;
width:10px;
height:10px;
border-radius:50%;
pointer-events:none;
animation:explode 900ms ease-out forwards;
z-index:9999;
}

@keyframes explode{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

.sparkle{
position:fixed;
pointer-events:none;
z-index:10000;
font-size:18px;
animation:sparkleFly 1000ms ease-out forwards;
}

@keyframes sparkleFly{
0%{transform:translate(0,0) scale(.5);opacity:1;}
100%{transform:translate(var(--x),var(--y)) scale(1.1);opacity:0;}
}

/* mobile tightening */

@media (max-width:600px){

.card{padding:22px;}

#garden{font-size:36px;}

button{font-size:16px;padding:11px 20px;}

}

</style>
</head>

<body>

<div class="card">

<h1 id="title"><strong>Bouquet Builder 💐</strong></h1>
<div class="subtitle">For the amazing women I know.</div>

<button id="generate" disabled>Tap to Prepare a Bouquet</button>

<div id="garden"></div>

<img id="bouquetImage" alt="Bouquet">

<div id="finalMessage">
🌸 Bouquet complete 🌸 <br>
Happy International Women's Day! <br>
<em> From Imron </em>
</div>

<audio id="dingSound" preload="auto">
<source src="ding.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const flowers=["🌷","🌹","🌼","🌻","🌺","💐"];

const bouquetImages=[
"bouquet1.jpg",
"bouquet2.jpg",
"bouquet3.jpg",
"bouquet4.jpg",
"bouquet5.jpg"
];

const TOTAL_TAPS=5;
const TAP_LOCK_MS=420;
const INITIAL_LOCK_MS=2500;

let bouquetIndex=0;
let clickCount=0;
let tapLock=false;

const garden=document.getElementById("garden");
const button=document.getElementById("generate");
const title=document.getElementById("title");
const subtitle=document.querySelector(".subtitle");
const bouquetImage=document.getElementById("bouquetImage");
const finalMessage=document.getElementById("finalMessage");
const dingSound=document.getElementById("dingSound");

setTimeout(()=>{
button.disabled=false;
button.classList.add("pulse");
},INITIAL_LOCK_MS);

button.addEventListener("click",()=>{

button.classList.remove("pulse");

if(button.textContent==="Prepare another bouquet"){
resetBouquet();
return;
}

if(tapLock) return;

tapLock=true;
setTimeout(()=>tapLock=false,TAP_LOCK_MS);

if(clickCount===0){
title.style.display="none";
subtitle.style.display="none";
}

clickCount++;

const flower=flowers[Math.floor(Math.random()*flowers.length)];

const span=document.createElement("span");
span.className="flower";
span.textContent=flower+" ";
garden.appendChild(span);

petalsFall(5);

updateButtonText();

if(clickCount===TOTAL_TAPS-1){

if(navigator.vibrate){
navigator.vibrate(40);
}

button.classList.add("shake","charge");
setTimeout(()=>button.classList.remove("shake","charge"),400);
}

if(clickCount>=TOTAL_TAPS){

button.disabled=true;

document.querySelectorAll(".petal").forEach(p=>p.remove());

const flowerNodes=garden.querySelectorAll(".flower");

flowerNodes.forEach((f,i)=>{
setTimeout(()=>{f.classList.add("swirl");},i*60);
});

setTimeout(()=>{

garden.innerHTML="";

explosionConfetti();
mixedPetalBurst();

bouquetImage.src=bouquetImages[bouquetIndex];
bouquetImage.style.display="block";

setTimeout(()=>bouquetImage.classList.add("show"),40);

finalMessage.style.display="block";
setTimeout(()=>finalMessage.classList.add("show"),180);

try{
dingSound.currentTime=0;
dingSound.play();
}catch(e){}

bouquetImage.scrollIntoView({
behavior:"smooth",
block:"center"
});

bouquetIndex++;
if(bouquetIndex>=bouquetImages.length) bouquetIndex=0;

clickCount=0;

button.style.display="none";

setTimeout(()=>{
button.style.display="inline-block";
button.textContent="Prepare another bouquet";
button.disabled=false;
},3000);

},650);

}

});

function updateButtonText(){

if(clickCount===0){
button.textContent="Tap to Prepare a Bouquet";
return;
}

if(clickCount<TOTAL_TAPS-1){
button.textContent=`Tap once more (${clickCount}/${TOTAL_TAPS})`;
return;
}

button.textContent="Final tap";
}

function resetBouquet(){

bouquetImage.style.display="none";
bouquetImage.classList.remove("show");
bouquetImage.src="";

finalMessage.style.display="none";
finalMessage.classList.remove("show");

garden.innerHTML="";
clickCount=0;

button.textContent="Tap to Prepare a Bouquet";
button.disabled=false;

window.scrollTo({top:0,behavior:"smooth"});
}

function petalsFall(amount){

const petals=["🍃","✨","🌿"];

for(let i=0;i<amount;i++){

const p=document.createElement("div");
p.className="petal";
p.textContent=petals[Math.floor(Math.random()*petals.length)];
p.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(p);

setTimeout(()=>p.remove(),4000);

}

}

function explosionConfetti(){

const colors=["#ff4d4d","#ffb84d","#4dd2ff","#7dff4d","#b04dff","#ffd24d"];

for(let i=0;i<120;i++){

const c=document.createElement("div");
c.className="explosion";
c.style.background=colors[Math.floor(Math.random()*colors.length)];

c.style.left=window.innerWidth/2+"px";
c.style.top=window.innerHeight/2+"px";

const x=(Math.random()*640-320)+"px";
const y=(Math.random()*640-320)+"px";

c.style.setProperty("--x",x);
c.style.setProperty("--y",y);

document.body.appendChild(c);

setTimeout(()=>c.remove(),900);

}

}

function mixedPetalBurst(){

const particles=["🌸","🌺","🌼","✨","💖"];

for(let i=0;i<70;i++){

const s=document.createElement("div");
s.className="sparkle";
s.textContent=particles[Math.floor(Math.random()*particles.length)];

s.style.left=window.innerWidth/2+"px";
s.style.top=window.innerHeight/2+"px";

const x=(Math.random()*800-400)+"px";
const y=(Math.random()*600-300)+"px";

s.style.setProperty("--x",x);
s.style.setProperty("--y",y);

document.body.appendChild(s);

setTimeout(()=>s.remove(),1000);

}

}

</script>
</body>
</html>
